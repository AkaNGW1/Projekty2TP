<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator pączków</title>

    <style>
        
        * {
            text-align: center;
            color: white;
        }
        
        #submit,#ilosc,#smak {color: black;}

        #smak option[value="500"] {color: green;}
        #smak option[value="400"] {color: brown;}
        #smak option[value="350"] {color: pink;}

        #ilosc {width: 50px;}

        #wynik {margin-top: 10px;}

        #kalkulator {
            text-align: center;
            background-color: rgba(77, 75, 75, 0.83);
            width: 400px;
            height: 350px;
            border-radius: 20px;
            box-shadow: 5px 5px 10px 0px rgba(0, 0, 0, 0.3);
        }

        #kalkulator2 {
            text-align: center;
            background-color: rgba(38, 131, 19, 0.83);
            width: 700px;
            height: 220px;
            border-radius: 20px;
            box-shadow: 5px 5px 10px 0px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: row;
        }

        #kal2 {
            text-align: center;
            background-color: rgba(77, 75, 75, 0.83);
            width: 200px;
            height: 50px;
            border-radius: 0 0 20px 20px;
            box-shadow: 5px 5px 10px 0px rgba(0, 0, 0, 0.3);
        }

        .h1 {
            margin-top: 20px;
        }

        img {width: 100px;height: 100px;border-radius: 20px;}

        body {
            background-image: url(paczki.jpg);
            background-repeat: no-repeat;
            background-size: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

    </style>

</head>
<body>
    
    <div id="kalkulator">
        <h1>Kalkulator Kalorii</h1>
        <h2>Wykonane przez: Wojtek Garbarz</h2>
        <h3>Ile pączków zjadłeś?</h3>

        <label for="ilosc">Ilość</label>
        <input type="integer" name="ilosc" id="ilosc">
        <p>

        <label for="smak">Wybierz smak</label>
        <select name="smak" id="smak">
            <option name="Dubajski" class="opt" value="500">Dubajski</option>
            <option name="Czekoladowy" class="opt" value="400">Czekoladowy</option>
            <option name="Różany" class="opt" value="350">Różany</option>
        </select>
        <br><br>

        <label for="lukier">Lukier</label>
        <input type="checkbox" id="lukier" name="lukier">

        <br><br>

        <label for="nadzienie2x">2x Nadzienie</label>
        <input type="checkbox" id="nadzienie2x" name="nadzienie2x">

        <br><br>

        <input type="submit" id="submit" value="Oblicz" onclick="oblicz()">
        
    </div>

    <div id="kal2">
            <div id="wynik"></div>
    </div>

    <p></p>

    <div id="kalkulator2">
        
        <h1 class="h1"><img src="dubajski.jpg" alt=""> Dubajski: 500 kcal</h1>
        <h1 class="h1"><img src="czekoladowy.jpg" alt=""> Czekoladowy: 400 kcal</h1>
        <h1 class="h1"><img src="rozany.jpg" alt=""> Różany: 350 kcal</h1>
        
    </div>

    <script>

        function oblicz() {
            let ilosc = document.getElementById("ilosc").value;
            let smak = document.getElementById("smak").value;
            const lukier = document.getElementById("lukier").checked;
            const nadzienie2x = document.getElementById("nadzienie2x").checked;

            let kalorie = 0;

            if (ilosc != " ") {
                if (lukier) {
                    kalorie += 100 * ilosc
                }
                
                if (nadzienie2x) {
                    kalorie += 200 * ilosc
                }

                kalorie += smak * ilosc
            }

            if (kalorie > 2000) document.getElementById("wynik").innerHTML = "TY TŁUŚCIOSZKU TO ZA DUŻO! ("+kalorie+" kcal)"
            else if (kalorie <= 2000) document.getElementById("wynik").innerHTML = "SMACZNEGO! ("+kalorie+" kcal)"
            

        }

    </script>

</body>
</html>
